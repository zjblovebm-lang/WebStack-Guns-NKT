@for(categorySite in categorySiteList){
	@if(isNotEmpty(categorySite.sites)){
	<section class="anyun-category" id="term-${categorySite.id}">
		<h2><i class="fa ${categorySite.icon}"></i>${categorySite.title}</h2>
		<div class="anyun-site-grid">
			@for(site in categorySite.sites){
			<a class="anyun-site-card" href="${site.url}" target="_blank" rel="noopener" title="${site.url}">
				<span class="anyun-site-icon">
					@if(isNotEmpty(site.thumb)){
					<img src="${site.thumb}" alt="${site.title}" loading="lazy" onerror="this.onerror=null;this.src='/static/img/github.png';">
					@}
					@if(!isNotEmpty(site.thumb)){
					<img src="/static/img/github.png" alt="${site.title}">
					@}
				</span>
				<strong>${site.title}</strong>
			</a>
			@}
		</div>
	</section>
	@}
@}
@if(!isNotEmpty(categorySiteList)){
<div class="anyun-empty-state">
	<i class="fa fa-search"></i>
	<h3>暂未收录匹配资源</h3>
	<p>请更换关键词后重新搜索。</p>
</div>
@}
