<div class="sidebar-menu toggle-others fixed">
    <div class="sidebar-menu-inner">
        <header class="logo-env">
            <!-- logo -->
            <div class="logo">
                <a href="/" class="logo-expanded anyun-logo-text">
                    <strong>安云科技</strong>
                    <span>TK Service Hub</span>
                </a>
                <a href="/" class="logo-collapsed anyun-logo-collapsed">
                    安
                </a>
            </div>
            <div class="mobile-menu-toggle visible-xs">
                <a href="#" data-toggle="user-info-menu">
                    <i class="linecons-cog"></i>
                </a>
                <a href="#" data-toggle="mobile-menu">
                    <i class="fa-bars"></i>
                </a>
            </div>
        </header>
        <ul id="main-menu" class="main-menu">
            <li>
                <a href="#服务矩阵" class="smooth">
                    <i class="fa fa-fw fa-rocket"></i>
                    <span class="title">服务矩阵</span>
                </a>
            </li>
            <li>
                <a href="#资源导航" class="smooth">
                    <i class="fa fa-fw fa-globe"></i>
                    <span class="title">资源导航</span>
                </a>
            </li>
            <li>
                <a href="#每日资讯" class="smooth">
                    <i class="fa fa-fw fa-newspaper-o"></i>
                    <span class="title">每日资讯</span>
                </a>
            </li>
            @for(title in titles){
                @if(tool.isEmpty(title.children)){
                <li>
                    <a href="#${title.name}" class="smooth">
                        <i class="fa fa-fw ${title.icon}"></i>
                        <span class="title">${title.name}</span>
                    </a>
                </li>
                @}else{
                <li>
                    <a>
                        <i class="fa fa-fw ${title.icon}"></i>
                        <span class="title">${title.name}</span>
                    </a>
                    <ul>
                        @for(subTitle in title.children){
                        <li>
                            <a href="#${subTitle.name}" class="smooth">
                                <span class="title">${subTitle.name}</span>
                            </a>
                        </li>
                        @}
                    </ul>
                </li>
                @}
            @}

            <div class="submit-tag">
                <a href="/about">
                    <i class="linecons-heart"></i>
                    <span class="tooltip-blue">关于安云</span>
                    <span class="label label-Primary pull-right hidden-collapsed">TK</span>
                </a>
            </div>
        </ul>
    </div>
</div>
